<script>
/* ======== debug.js ======== */
/* =========================================================
   debug — production-safe logging
   LOG(...) is a no-op unless window.DEBUG is truthy.
   Flip on from the console with:  DEBUG = true
   console.warn / console.error are left untouched on purpose.
   ========================================================= */
window.DEBUG = false;
window.LOG = function () {
	if (window.DEBUG) console.log.apply(console, arguments);
};


/* ======== sandy.js ======== */
/* =========================================================
   sandy — minimal DOM/utility framework
   Provides the three primitives the app depends on:
     sandy.addDiv(parent, classStr)  -> jQuery <div>
     sandy.mainCListen.add/rm(obj)    -> outside-click registry
     sandy.setupSrhD(d, obj)          -> search-input UI bound to obj.srh
   ========================================================= */
/* HTML-escape user-supplied strings before interpolating into markup.
   Used wherever project/tab/file names are built into HTML in the app shell. */
window.escHtml = function (s) {
	return String(s == null ? "" : s)
		.replace(/&/g, "&amp;")
		.replace(/</g, "&lt;")
		.replace(/>/g, "&gt;")
		.replace(/"/g, "&quot;")
		.replace(/'/g, "&#39;");
};

var sandy = {

	/* Create a <div> with the given classes, append to parent, return it ($). */
	addDiv: function (parent, classStr) {
		var d = $("<div></div>");
		if (classStr) d.addClass(classStr);
		$(parent).append(d);
		return d;
	},

	/* Outside-click registry. Registered objects get .mainCheck() called
	   on any mousedown inside the main container — used so open dropdowns
	   close when the user clicks elsewhere. Mirrors boss.mainCListen. */
	mainCListen: {
		data: [],
		_wired: false,

		_wire: function () {
			if (this._wired) return;
			this._wired = true;
			var self = this;
			$(document).on("mousedown", function () {
				// copy so handlers can rm() themselves mid-iteration
				var arr = self.data.slice();
				for (var x = 0; x < arr.length; x++) {
					if (typeof arr[x].mainCheck === "function") arr[x].mainCheck();
				}
			});
		},

		add: function (obj) {
			this._wire();
			if (this.data.indexOf(obj) === -1) this.data.push(obj);
		},

		rm: function (obj) {
			var i = this.data.indexOf(obj);
			if (i !== -1) this.data.splice(i, 1);
		}
	},

	/* Build a search input + results area inside d, wire keyup to obj.srh,
	   and return obj augmented with .inp / .resD. obj.srh(value, resD). */
	setupSrhD: function (d, obj) {
		d = $(d);
		var cont = sandy.addDiv(d, "srhCont flex column flex1 w100p");

		var inpRow = sandy.addDiv(cont, "srhInpRow flex alignMe w100p pad0p2em");
		var inp = $("<input class='srhInp flex1' type='text' placeholder='Search...'>");
		inpRow.append(inp);

		var resD = sandy.addDiv(cont, "srhRes flex1 flex column w100p overflow");

		obj.inp = inp;
		obj.resD = resD;

		inp.on("keyup", function () {
			obj.srh($(this).val(), resD);
		});

		return obj;
	}
};

	setPosToP:function(d,p,topOff,leftOff){
			var pos = p.offset()
			d.css({position:'relative', top:pos.top+topOff,left:pos.left+leftOff})

	setupTogShowHide:function(icon, obj,exitD){
		//
		var showing = false
		
		var tog = {
			show:function(){
				obj.show()
				showing = true
			},
			hide:function(){
				obj.hide()
				showing = false
			},
			
			toggle:function(){
				if(showing){
					this.hide()
				}else{
					this.show()
				}
				
			}
			
		}
		icon.on('click' ,function(){
			tog.toggle()
		})
		
		
		if(exitD){
			exitD.on('click',function(){
				tog.hide()
			})
		}
	
		return tog
	},

		}
		
		inp.on('keyup', function(){
			setW()
		})
		setW()

	isNumber: function(value) {

		})

	removeObjFromArr:function(obj,arr){
		var i = arr.indexOf(obj)
		LOG(i)
		arr.splice(i,1)
		return i
	},
		
	//https://stackoverflow.com/questions/5306680/move-an-array-element-from-one-array-position-to-another
	arrayMove:function(arr, fromIndex, toIndex) {
		var ele = arr[fromIndex];
		arr.splice(fromIndex, 1);
		arr.splice(toIndex, 0, ele);
	},
	
	diff:function(a,b){
		return Math.abs(a - b);
	},
	
	findClosestOpen:function(arr,ele){
		if(arr.length < 2) return false
		var arr = arr.filter((ele) => ele.open)
		LOG(arr)
		var i = arr.indexOf(ele)
		if(i === 0){
			i++
		}else{
			i--
		}
		return arr[i]
		
	},
	
	convertSecondsToHMS:function(sec){
		return new Date(sec * 1000).toISOString().substring(11,19)
	},

	//https://stackoverflow.com/questions/9640266/convert-hhmmss-string-to-seconds-only-in-javascript
	convertHMSTimeToSec:function(hms){
		LOG(hms)
		var a = hms.split(':'); // split it at the colons
		return (+a[0]) * 60 * 60 + (+a[1]) * 60 + (+a[2]); 
	},

	preventMainScroll:function(d,c){
		
		d.on('scroll',function(e){
			var top = d[0].scrollTop
			var totalScroll = d[0].scrollHeight;
            var currentScroll = top + d[0].offsetHeight;
			if(currentScroll === totalScroll) {
				d[0].scrollTop = top - 1;
           }
		})

	addLimitFunctions:function(obj){
		obj.limits =[]
		obj.limit =0;
		obj.limitDs =[]
		obj.i = 0
		
		obj.getObj = function(val){
			var arr = this.limitDs
			for(var x =0; x < arr.length; x++){
				if(arr[x].val === val){
					return arr[x]
				}
			}
		}
		
		obj.selectByVal = function(val){
			this.selectLimit(this.getObj(val))
		}
		
		obj.selectLimit = function(obj){
			LOG(obj)
			LOG(this)
			this.limit = obj.val
			this.fBoss.srhLimit = obj.val
			obj.d.addClass("colBlue")
			obj.d.removeClass("colGrey")
			var arr = this.limitDs
			for(var x =0; x < arr.length; x++){
				if(obj !== arr[x]){
					arr[x].d.addClass("colGray")
					arr[x].d.removeClass("colBlue")
				}
			}
		}
		obj.setupD = function(){
			var o = this.getObj(this.limit)
			if(o){
				this.selectLimit(o)
			}
		}
	},
	
	
	addOpenFileFunctions:function(obj){
		
		obj.showFiles = function(d,arr,boss,extras){
			LOG(this)
			this.showArrDivs(d,arr,boss,extras,this.limit)
			this.setupOpenEvents(d,"nuF",arr,0,boss)
		}
		
		obj.showArrDivs = function(d,arr,boss,extras,max){
			var txt =""
			d.empty()
			for(var x =0; x < arr.length; x++){
				if(x >= max){
					break;
				}
				txt+=boss.getFileSrhTxt("nuF",extras)
			}
			d.append(txt)
		}
		
		obj.setupOpenEvents = function(d,cl,arr,start,boss){
			var divs = d.find("."+cl)
			divs.each(function(index){
				$(this).removeClass(cl)
				obj.setupOpenEvent($(this),arr[index+start],boss)
			
			})
		}
		
		obj.setupOpenEvent = function(d,ele,boss){
			d.find(".name").text(ele.obj.name)
			var openD = d.find(".openD")
			getFolderOpenIcon(openD,"1em")
			d.on('click',function(){
				boss.openFile(ele)
			})
		}
		
		
	},

	getIndicesOf:function(searchStr, str, caseSensitive) {
				var searchStrLen = searchStr.length;
				if (searchStrLen == 0) {
					return [];
				}
				var startIndex = 0, index, indices = [];
				if (!caseSensitive) {
					str = str.toLowerCase();
					searchStr = searchStr.toLowerCase();
				}
				while ((index = str.indexOf(searchStr, startIndex)) > -1) {
					indices.push(index);
					startIndex = index + searchStrLen;
				}
				return indices;
	},

boss.setupDbUpload  = function(dbB,db){
	
	dbB.uploadFromTxt = async function(o,overwrite,saves){
			LOG(o)
			LOG(o.data)
			if(overwrite){
				var res = await this.deleteAll()
			}
			LOG(saves)
			this.loadAll(o.data,overwrite)
					
	}
	
	dbB.loadAll = async function(obj,overwrite){
			LOG(obj)
			const old = obj
			var tabs = await this.loadTabs(obj.tabs)
			LOG(tabs)
			
			//check for duplicate names
			for(var x =0; x < obj.projects.length; x++){
				var pro = obj.projects[x]
				//this.checkDuplicate(db.projects,'name',pro.name)
				this.getProjectLastTabs(pro,obj.lastTabs)
				this.updateProjectTabs(pro,tabs)
				this.updateLastTabs(pro.lastTabArr,tabs)
				await this.createLast(pro)
			}
						
			var lastPIndex = this.getInfoLastPIndex(obj.projects, obj.info[0].last)
			
			var nuPs = await this.loadProjects(obj.projects)
			if(overwrite){
				await this.makeInfoLast(nuPs[lastPIndex])
			}
			
			await this.loaded()
			LOG("fin")
			boss.upBoss.clear()
	}
		
		dbB.checkDuplicate = async function(tbl,attr,n){
			var arr = tbl.where(attr).equalsIgnoreCase(n).toArray();
			LOG(arr)
		}
		
		dbB.getInfoLastPIndex = function(arr,lastID){
			for(var x =0; x < arr.length; x++){
				LOG(arr[x])
				if(arr[x].id == lastID){
					return x
				}
			}
			
		}
		
		dbB.makeInfoLast = async function(id){
			LOG(id)
			
			await db.info.add({last:id,proN:0})
		}
		
		dbB.createLast =async function(pro){
			LOG(pro)
			var last = pro.lastTabArr
			pro.lastTabs = await db.lastTabs.add({html:last.html, css:last.css, javascript:last.javascript})
			delete pro.lastTabArr
		}
		
		dbB.getProjectLastTabs= function(pro,arr){
			//var id = pro.lastTabs
			var id = pro.lastTabs
			LOG(pro)
			for(var x=0; x < arr.length; x++){
				if(id === arr[x].id){
					pro.lastTabArr= arr[x]
					break
				}
			}
			LOG(pro)
		}
		
		dbB.updateLastTabs=function(last,tabs){
			LOG(last)
			var o ={
				update:function(n,tabs){
					for(var x = 0; x < tabs.length; x++){
						if(n === tabs[x].oldID){
							return tabs[x].nuID
						}
					}
				}
			}
			
			last.html = o.update(last.html,tabs)
			last.javascript = o.update(last.javascript,tabs)
			last.css = o.update(last.css,tabs)
			LOG(last)
			
		}
		
		dbB.updateProjectTabs = function(pro,tabs){
			var arr = pro.tabs
			pro.tabs = this.checkOldProject(arr,tabs,'oldID','nuID')
		}
		
		dbB.checkOldProject = function(arr,chkArr,old,nu){
			var nuA =[]
			for(var x =0; x < arr.length; x++){
				var n = arr[x]
				for(var y =0; y < chkArr.length; y++){
					if(n === chkArr[y][old]){
						nuA.push(chkArr[y][nu])
						break
					}
				}
			}
			return nuA
		}
		
		
		
		dbB.loadProjects=async function(arr){
			var pro = arr.map(({ id, ...rest }) => rest);
			return await db.projects.bulkAdd(pro,{ allKeys: true })
		}
		
		
		dbB.loadTabs=async function(arr){
			var old =[]
			for(var x=0; x < arr.length; x++){
				old.push(arr[x].id)
				delete arr[x].id
			}
			
			return db.tabs.bulkAdd(arr, { allKeys: true }).then(ids => {
				for(var x =0; x < arr.length; x++){
					arr[x].nuID = ids[x]
					arr[x].oldID = old[x]
				}
				return arr
			});
		}
		
		
		
		
		
		
		
	
}

boss.setupTabs = function(){
	
	
	
	var tBoss = {
		
		createMain:function(d,addS,arrowS){
			d.append("<div class='w100p h100p tCont flex alignMe colWhite '>"
				+"<div class='add hlIcon flexMe'>"+icons.getAdd(addS)+"</div>"
				
				+"<div class='bk hlIcon none arrow h100p flexMe '>"+icons.getChevronLeft(arrowS)+"</div>"
				
				+"<div class='flex1 inlineGrid len hFit'>"
					+"<div class='w100p flex alignMe overflow track'>"
						+"<div class='mainTabs flex alignMe posRel l0'></div>"
					+"</div>"
				+"</div>"
				+"<div class='ff hlIcon none arrow h100p flexMe'>"+icons.getChevronRight(arrowS)+"</div>"
			+"</div>")
			
			return {c:d.find(".tCont"), add:d.find(".add"), bk:d.find(".bk"),ff:d.find(".ff"),data:[],i:0,pos:0,
			len:d.find(".len"),tabs:d.find(".mainTabs"), arrows:d.find(".arrow"),track:d.find(".track"),
			
				addNuTabData:function(d){
					
					this.checkW()
					this.moveToTab(d)
				},
				
				clear:function(){
					this.tabs.empty()
					this.data.length = 0
					this.tabs.css("left","0px")
					this.i =0
					this.pos = 0
					
				},
				
				addTabData:function(d,obj){
					this.data.push({d:d,obj:obj})
				},
				
				
				findTabById:function(id){
					var arr = this.data
					LOG(arr)
					LOG(id)
					for(var x =0; x < arr.length; x++){
						if(arr[x].obj.id === id ){
							return arr[x]
						}
					}
				},
				
				findTabByObj:function(obj){
					var arr = this.data
					LOG(obj)
					LOG(arr)
					for(var x =0; x < arr.length; x++){
						if(arr[x].obj === obj ){
							return arr[x]
						}
					}
				},
				
				removeObj:function(obj){
					var tab = this.findTabByObj(obj)
					var i = this.data.indexOf(tab)
					this.data.splice(i,1)
					tab.d.remove()
					return i
				},
				
				getNext: function(i){
					if(i <0){
						i++
					}
					
					if(i >= this.data.length){
						i =0
					}
					
					return this.data[i]
				},
				
				
				massAdd:function(arr){
					var txt =''
					
					for(var x =0; x < arr.length; x++){
						txt += this.addD()
					}
					this.tabs.append(txt)
					this.checkW()
				},
				
				dAddRmClass:function(d,add,rm){
					d.addClass(add)
					d.removeClass(rm)
				},
				
				checkW:function(){
					LOG("check W")
					if(this.tabs.width() > this.len.width()){
						this.arrows.removeClass("none")
					}else{
						this.arrows.addClass("none")
					}
				},
				
				move:function(dir){
					//get w of tab
					
					LOG(this.i)
					if(this.i === -1) this.i = 0
					var w = this.data[this.i].d.outerWidth()
					
					if(dir === "ff"){
						this.i++
						var last = this.data.length-1
						if(this.i >= last){
							this.i = last
							this.pos = this.getDist(last)*-1
							
						}else{
							this.pos -= w
						}
						
					}else{
						this.i--
						if(this.i <=0){
							this.i =0
							this.pos =0
						}else{
							this.pos += w
						}
					}
					
					this.tabs.css("left",this.pos)
					return w
				},
				
				getDist:function(i){
					var arr = this.data
					var dist = 0;
					for(var x = 0; x < i; x++){
						dist += arr[x].d.outerWidth()
					}
					return dist
				},
				
				isTabViewable:function(dist){
					var viewW = this.track.width()
					var posL = this.pos - viewW
					LOG(posL)
					if(posL < dist ){
						return true
					}
				},
				
				//t= tab obj in this.data
				moveToTab:function(t){
					var d = t.d
					
					var i = this.data.indexOf(t)
					
					var dist = this.getDist(i)*-1
					LOG(dist)
					var res = this.isTabViewable(dist)
										
					if(!res){
						LOG("move?")
						this.tabs.css("left",dist)
						this.pos = dist
						
					}
					this.i = i
				},
				
				goToTab:function(t){
					var d = t.d
					var i = this.data.indexOf(t)
					var dist = this.getDist(i)*-1
					this.tabs.css("left",dist)
					this.pos = dist
					this.i = i
				}
				
				
				
					
					  
			}
			},
		
		setupEvents:function(obj){
			
			obj.add.on('click',function(){
				LOG(obj)
				obj.addNu()
				
			})
			
			obj.bk.on('click',function(){
				obj.move("bk")
			})
			
			obj.ff.on('click',function(){
				obj.move("ff")
				
			})
			
			
		},
		
		
		
		
		
	
	
	}
	
	this.tabBoss = tBoss
}

boss.setupDlFiles = function(d){
	d.on('click',function(){
		dl()
	})
	
	dl = async function(){
		const zip = new JSZip();
		var o = await boss.dbBoss.getCode()
		LOG(o)
		var arr = o.tabs
		for(var x =0; x < arr.length; x++){
			var f = arr[x]
			var n = f.name+'.'+getFileExt(f.type)
			zip.file(n, f.data);
		}

		zip.generateAsync({type:"blob"}).then(function(content) {
		    triggerDownload(content, "project.zip", "application/zip");
		});
		
	}

	getFileExt = function(o){
		if(o.type === 'javascript'){
			return '.js'
		}
		return '.'+o.type
	}
	
	triggerDownload = (content, fileName, contentType) => {
        const blob = new Blob([content], { type: contentType });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        
        a.href = url;
        a.download = fileName;
        a.click();
        
        // Clean up memory
        URL.revokeObjectURL(url);
    };
}

			return true
		}
		
		if(obj.info.line == txt){
			return true
		}
		
		return false
	},
	

    addD: function(data, $d) {
      if (!$d) $d = this.mainD; // jQuery container
		var raw = this.extractRawText(data)
	  LOG(raw)
      const $container = $("<div></div>"); // outer container for one log/error

      if (data.type === "log") {
        this.addLog(data.level, data.args, data.source, data.line, $container);
      } else if (data.type === "error") {
        this.addError(data.message, data.source, data.line, $container);
      }

      $d.append($container);
	LOG(data)
	LOG($container)
      this.data.push({d:$container,info:data,raw:raw})
    },
	
	extractRawText: function(data) {
  if (!data) return "";

  if (data.type === "error") {
    return `Error: ${data.message || ""}`;
  }

  if (data.type === "log" && Array.isArray(data.args)) {
    return data.args.map(arg => this.stringifyArg(arg)).join(" ");
  }

  return "";
},
	
	stringifyArg: function(arg) {
  if (!arg) return "null";

  switch (arg.__type) {
    case "primitive":
      return typeof arg.value === "string"
        ? `"${arg.value}"`
        : String(arg.value);

    case "function":
      return `ƒ ${arg.name || "anonymous"}()`;

    case "object": {
      const name = arg.className || "Object";
      const props = arg.props
        ? Object.entries(arg.props)
            .map(([k,v]) => `${k}: ${this.stringifyArg(v)}`)
            .join(", ")
        : "";
      return `${name} { ${props} }`;
    }

    default:
      return "[unknown]";
  }
},
	
	
	addLog: function(level, args, source, line, $container) {
    const $content = $('<div></div>')
        .addClass('log-content')
        .css({
            'font-family': 'monospace',
            'color': '#d4d4d4',
            'background': '#1e1e1e',
            'padding': '4px 8px',
            'border-radius': '4px',
            'margin-bottom': '6px',
            'position': 'relative'
        });

    const renderArg = (arg, depth = 0) => {
        if (!arg) return $('<span>null</span>').css('color','#9cdcfe');

        switch(arg.__type) {
            case 'primitive':
                const val = arg.value;
                let color = '#d4d4d4';
                if (typeof val === 'string') color = '#ce9178';
                else if (typeof val === 'number') color = '#b5cea8';
                else if (typeof val === 'boolean') color = '#569cd6';
                else if (val === null) color = '#569cd6';
                return $('<span></span>').text(typeof val === 'string' ? `"${val}"` : val).css('color', color);

            case 'function':
                const $fn = $('<span></span>')
                    .text(`ƒ ${arg.name}() {…}`)
                    .css({ cursor: 'pointer', color: '#dcdcaa' });

                $fn.on('click', () => {
                    if ($fn.next().hasClass('function-body')) $fn.next().toggle();
                    else {
                        const $body = $('<pre></pre>')
                            .addClass('function-body')
                            .text(arg.body)
                            .css({
                                'margin-left': '20px',
                                'background': '#252526',
                                'padding': '4px',
                                'border-radius': '3px',
                                'white-space': 'pre-wrap',
                                'color':'#dcdcaa'
                            });
                        $fn.after($body);
                    }
                });
                return $fn;

            case 'object':
                const isArray = Array.isArray(arg.props);
                let displayName = arg.className;
                if (isArray) displayName = `Array[${Object.keys(arg.props || {}).length}]`;

                const $wrapper = $('<span></span>'); // inline wrapper
                const $label = $('<span></span>')
                    .text(`${displayName} { `)
                    .css({ cursor: 'pointer', color: '#4ec9b0' });

                $wrapper.append($label);

                const $props = $('<span></span>'); // inline properties container

                const entries = arg.props && typeof arg.props === 'object'
                    ? Object.entries(arg.props)
                    : [];

                entries.forEach(([key, val], i) => {
                    const $key = $('<span></span>').text(`${key}: `).css('color','#9cdcfe');
                    const $val = renderArg(val, depth + 1);
                    $props.append($key).append($val);
                    if (i < entries.length - 1) $props.append(', '); // comma between properties
                });

                $wrapper.append($props);
                $wrapper.append(' }').css({ cursor: 'pointer', color: '#4ec9b0' });

                // click to toggle first-level object properties
                $label.on('click', () => {
                    $props.toggle();
                });

                return $wrapper;

            default:
                return $('<span></span>').text('[unknown]').css('color','#808080');
        }
    };

    args.forEach(arg => {
        $content.append(renderArg(arg)).append(' ');
    });

    // Script and line info below, aligned right
    const $sourceInfo = $('<div></div>')
        .text(`${source || 'unknown'}:${line || '?'}`)
        .css({
            'text-align': 'right',
            'color': '#3794ff',
            'cursor': 'pointer',
            'font-size': '0.8em',
            'margin-top': '2px',
            'text-decoration': 'underline'
        });

    $container.append($content).append($sourceInfo);
},









    

    addError: function(message, file, line, $container) {
      if (!$container) return;
      const $line = $("<pre></pre>")
        .css({ margin: 0, padding: "2px 4px", color: "red", fontWeight: "bold" })
        .text(`[ERROR] (${file || "unknown"}:${line || "?"}) ${message}`);

      $container.append($line);
    }
  
  }
  conB.setup();
  this.consoleB = conB;
};

/* =========================================================
   Serialization helpers
========================================================= */
function serialize(arg) {
  if (typeof arg === "object" && arg !== null) {
    try {
      return JSON.stringify(arg, getCircularReplacer(), 2);
    } catch {
      return "[Object]";
    }
  }
  return String(arg);
}

function getCircularReplacer() {
  const seen = new WeakSet();
  return (key, value) => {
    if (typeof value === "object" && value !== null) {
      if (seen.has(value)) return "[Circular]";
      seen.add(value);
    }
    return value;
  };
}

				if(html.length ===0){
					txt = this.addBasicHtml(this.makeScriptText(jsArr))
					LOG(txt)
					htmlEdi.edi.load(txt)
				}else{
					this.addMissingScripts(html,jsArr,htmlEdi)
				}
			}else{
				this.addMissingScripts(html,jsArr,htmlEdi)
			}
		},
		
		addMissingScripts:function(html,jsArr,edi){
			
			var missing = this.hasScripts(html,jsArr)
			LOG(missing)
			var txt = this.makeScriptText(missing)
			var x =0
			var y =0
			if(missing.length !== jsArr.length){
				x = this.findLastLine(html,"<\/script>")
			}
			
			
			var edi = boss.findEdi("html").edi
			
			this.addTxtAt(x,y,edi,txt)
			
			
		},
		
		findLastLine:function(html,txt){
			const index = html.lastIndexOf(txt);
			if (index === -1) return -1; // Not found
			 const lines = html.substring(0, index).split('\n');
			  return lines.length+1; // Line numbers start at 1
		},
		
		findLine:function(html,txt){
			const index = html.indexOf(txt);
			 if (index === -1) return -1; // Not found
			 const lines = html.substring(0, index).split('\n');
			  return lines.length+1; // Line numbers start at 1
		},
		
		addTxtAt:function(x,y,edi,txt){
			LOG(edi)
			const position = { lineNumber: x, column: y };

			// Create a range from the position to itself (insertion point)
			const range = new monaco.Range(
				position.lineNumber,
				position.column,
				position.lineNumber,
				position.column
			);

			// Define the edit operation
			const editOperation = {
				range: range,
				text: txt,
				forceMoveMarkers: true // Optional: ensures cursor markers move correctly
			};

			// Execute the edit
			edi.executeEdits("my-source", [editOperation]);
		},
		
		addBasicHtml:function(scripts){
			return "<!DOCTYPE html> \n"
				+"<html>\n"
				+"<head>\n"
				+scripts
				+"\n"
				+"</head>\n"
				+"<body>\n"
				+"</body>\n"
				+"</html>"
		},
		
		makeScriptText:function(arr){
			LOG(arr)
			var txt =''
			for(var x =0; x < arr.length; x++){
				txt+='<\script src="'+arr[x].name+'"><\/script>\n'
			}
			return txt
		},
		
		findTag: function(html,tag){
			return html.indexOf(tag)
		},
		
		findHead:function(html){
			return html.indexOf("</head>")
		},
		
		hasScripts: function(html,arr){
			var res =[]
			for(var x=0; x< arr.length; x++){
				if(html.indexOf(arr[x].name) === -1){
					res.push(arr[x])
				}
			}
			return res
		},
		
		getJsOrder: async function(id){
			var o = await boss.dbBoss.getCode(id)
			var html = o.tabs.filter((ele) => ele.type === "html")[0]
			var arr = o.tabs.filter((ele) => ele.type === "javascript")
			var res =[]
			for(var x =0; x < arr.length; x++){
				 
				if(x ===0){
					res.push(arr[x])
				}else{
					for(var y =0; y < res.length; y++){
						if(html.data.indexOf(res[y].name) > html.data.indexOf(arr[x].name)){
							res.splice(y,0,arr[x])
							break
						}else{
							if(y === res.length-1){
								res.push(arr[x])
								break
							}
						}
					}
				}
			}
			
			return res
		}
	}
	this.srcChecker = chk
}

/* Load Monaco's web workers from the CDN cross-origin via a blob shim.
   Without this, cross-origin (CDN) Monaco can't spawn workers and falls
   back to the main thread ("Could not create web worker" warning). */
window.MonacoEnvironment = {
	getWorkerUrl: function (moduleId, label) {
		var base = 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.0/min/';
		var shim = 'self.MonacoEnvironment={baseUrl:"' + base + '"};' +
			'importScripts("' + base + 'vs/base/worker/workerMain.js");';
		return URL.createObjectURL(new Blob([shim], { type: 'text/javascript' }));
	}
};

	const VOID_TAGS = new Set([
		  "area","base","br","col","embed","hr","img","input",
		  "link","meta","param","source","track","wbr"
	]);
	
	async function loaded(){

	function setupEdiEvents(obj,id){

		editor.updateOptions({renderLineHighlight: "none"});

		  editor.updateOptions({
			renderLineHighlight: "none" // removes the line highlight
		  });
		});

		editor.onDidFocusEditorWidget(() => {
		  editor.updateOptions({
			renderLineHighlight: "line" // restore line highlight
		  });
		});

		 editor.clear = function(){
	        this.tabID = false
	        this.load("")
   		 }
		
		editor.load = function(txt,line){
			LOG(line)
			editor.setValue(txt);
			editor.setLine(line)
		}

		editor.onKeyUp(function(e){
			LOG('key up!')
			const position = editor.getPosition();
    		const line = position.lineNumber;
			
			editor.saveLine(line)
		})

		editor.onMouseUp((e) => {
    		editor.saveLine(e.target.position.lineNumber);
		})

		editor.saveLine = async function(line){
			await boss.dbBoss.setTabLine(editor.tabID, line);
		}

			if(!line) line = 1
			editor.setPosition({ lineNumber: line, column: 1 });

		editor.saveMyStuff = async function(txt){
			if(!this.tabID) return
        	await boss.dbBoss.setTabData(this.tabID,txt)
		}
		
		editor.onDidChangeModelContent((e) => {
			if (editor.isProgrammaticMove) return;
		  const model = editor.getModel();
		  const pos = editor.getPosition();

		  for (const change of e.changes) {
			// Only when user types ">"
			if (change.text !== ">" || change.rangeLength !== 0) continue;

			const line = model.getLineContent(pos.lineNumber);
			const beforeCursor = line.slice(0, pos.column - 1);

			// Ignore closing tags and comments
			if (beforeCursor.endsWith("-->")) return;
			if (/<\/[^>]*>$/.test(beforeCursor)) return;

			// Match opening tag
			const match = beforeCursor.match(/<([a-zA-Z][\w-]*)(\s[^>]*)?>$/);
			if (!match) return;

			const tagName = match[1].toLowerCase();

			// Skip void/self-closing tags
			if (VOID_TAGS.has(tagName)) return;
			if (beforeCursor.endsWith("/>")) return;

			const closing = `</${tagName}>`;

			editor.executeEdits("auto-close-tag", [{
			  range: {
				startLineNumber: pos.lineNumber,
				startColumn: pos.column,
				endLineNumber: pos.lineNumber,
				endColumn: pos.column,
			  },
			  text: closing,
			}]);

			editor.setPosition(pos);
		  }
		  
		  var txt = editor.getValue()
		  //LOG(txt)
		
		  editor.saveMyStuff(txt)
		  
		  
		});
		
		editor.onKeyUp((e) => {
		  //LOG('Key up:', e.browserEvent.key);
		  boss.iframeB.runCode(editor)
		});

			}
		})
		
		this.overlayD = $(d).find(".overlayD")
		
		
		window.addEventListener("message", e => {
			if (e.source !== iframe.contentWindow) return;

			const data = e.data;
			if (!data || typeof data !== "object") return;
				
			switch (data.type) {
				case "iframe-ready":
				  
				  boss.iframeB.sendCode();
				  break;

				case "log":
				  boss.consoleB.addD({
					type: "log",
					level: data.level,
					args: data.args,
					source: data.source,
					line: data.line
				  });
				  break;

				case "error":
				  boss.consoleB.addD({
					type: "error",
					message: data.message,
					source: data.source,
					line: data.line
				  });
				  break;

				default: break;
			  }
			 if(boss.iframeB.edi){
				
				//boss.iframeB.edi.setPosition({ lineNumber: 1, column: 1 });
				boss.iframeB.edi.focus() 
			 }
		  
		});

	},
	
	overlayOn: function(){
		this.overlayD.addClass("overlay")
	},
	
	overlayOff:function(){
		this.overlayD.removeClass("overlay")
	},
	
	findScript:function(txt){
	
		var arr = this.code.scripts
		
		for(var x =0; x < arr.length; x++){
			if(txt.indexOf(arr[x].name) !== -1){
				//LOG(arr[x].name)
			}
		}
	},
	
	sendCode:function(){
	   
	    this.d[0].contentWindow.postMessage({
	        type:"run",
	        html:this.code.html,
	        css:this.code.css,
	        scripts:this.code.scripts
	    }, "*");

	},
	
	runCode: async function(){

	   
	
	    if(!boss.autoB.isOn()) return
	
	    const o = await boss.dbBoss.getCode()
	
	    this.code = await this.filterCode(o.tabs)
		
	    const iframe = this.d[0]
	
	    iframe.src = iframe.src
	
	    iframe.onload = () => {
	
	        this.sendCode()
	
	    }
	},
	
	filterCode: async function(arr){

	    const order = await boss.srcChecker.getJsOrder()
	
	    const out = {
	        html:"",
	        css:"",
	        scripts:[]
	    }
	
	    for(let x=0; x<arr.length; x++){
	
	        const type = arr[x].type
	
	        if(type==="html") out.html = arr[x].data
	        if(type==="css")  out.css  = arr[x].data
	
	    }
	
	    // add javascript files in correct order
	    for(let x=0; x<order.length; x++){
	
	        const file = order[x]
	
	        out.scripts.push({
	            name:file.name || "js"+x,
	            data:file.data
	        })
	
	    }

    	return out

	}
	
	
}

	var arr = this.edis
	for(var x =0; x < arr.length; x++){
		//arr[x].edi.posD
		var o = arr[x].obj
		this.setEdiPos(o.wrap,o.posD)
	}
	
}
